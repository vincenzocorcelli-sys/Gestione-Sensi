<title>Sensi — Gestione Economica 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ac:#BA7517;--ac-bg:rgba(186,117,23,0.1);--pos:#0F6E56;--neg:#A32D2D;
  --bg:#f8f6f1;--surf:#ffffff;--surf2:#f2efe8;--border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);--txt:#1a1a1a;--txt2:#5a5a5a;--txt3:#9a9a9a;
  --mono:'DM Mono',monospace;--pf:'Playfair Display',Georgia,serif;
  --rad:8px;--radlg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --ac:#EF9F27;--ac-bg:rgba(239,159,39,0.12);--pos:#5DCAA5;--neg:#E24B4A;
  --bg:#111;--surf:#1c1c1c;--surf2:#252525;--border:rgba(255,255,255,0.1);
  --border2:rgba(255,255,255,0.18);--txt:#f0ebe0;--txt2:#a0988a;--txt3:#5a5a5a;
}}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);min-height:100vh;}
*{-webkit-tap-highlight-color:transparent;}
.rh:hover{background:var(--ac-bg)!important;}
.nb{border:none;cursor:pointer;background:none;font-family:var(--mono);font-size:13px;color:var(--txt2);padding:9px 14px;border-bottom:2px solid transparent;letter-spacing:0.04em;transition:all 0.15s;white-space:nowrap;}
.nb.on{border-bottom:2px solid var(--ac)!important;color:var(--ac)!important;}
.nb:hover:not(.on){color:var(--txt);}
input,select,button{font-family:var(--mono);}
input:focus,select:focus{outline:none;border-color:var(--ac)!important;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
@media(max-width:600px){
  input,select,textarea{font-size:16px!important;}
  .pg{padding:16px 12px!important;}
  .hdrwrap{padding-left:12px!important;padding-right:12px!important;}
  .nb{padding:10px 13px!important;font-size:14px!important;}
}
</style>

function autoMacro(nome){
  const n=nome.toLowerCase();
  if(/stipendio|personale|collaborator|straordinar|tfr|pamela/.test(n))return 'Costo personale';
  if(/materie|food|f&b|fornitor|bevand|cucina|pasti/.test(n))return 'Food cost';
  if(/affitto|utenz|acquedotto|gas|luce|acqua|minerva|adriana/.test(n))return 'Affitto e utenze';
  if(/commercialista|software|abbonament|consulen|contabil/.test(n))return 'Spese fisse';
  return 'Spese variabili';
}

// ── Helpers generici ─────────────────────────────────────────────
const euro=n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n||0);
const uid=()=>Math.random().toString(36).slice(2,9);
const tod=()=>new Date().toISOString().slice(0,10);
const fmt=d=>{if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]:d;};
const gm=d=>new Date(d).getMonth()+1;

// ── Rileva schermo mobile (iPhone) ───────────────────────────────
function useMobile(){
  const q='(max-width:600px)';
  const [m,sM]=useState(()=>window.matchMedia(q).matches);
  useEffect(()=>{
    const mq=window.matchMedia(q);
    const fn=e=>sM(e.matches);
    if(mq.addEventListener)mq.addEventListener('change',fn);else mq.addListener(fn);
    return()=>{if(mq.removeEventListener)mq.removeEventListener('change',fn);else mq.removeListener(fn);};
  },[]);
  return m;
}

function getBinId(){return JSONBIN_BIN_ID||localStorage.getItem('sensi_bin_id')||'';}

async function jbLoad(){
  const bid=getBinId();
  if(!bid)return null;
  try{
    const r=await fetch(`${JB}/${bid}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
    if(!r.ok){
      const cached=localStorage.getItem('sensi_cache');
      return cached?JSON.parse(cached):null;
    }
    const data=await r.json();
    localStorage.setItem('sensi_cache',JSON.stringify(data));
    return data;
  }catch{
    const cached=localStorage.getItem('sensi_cache');
    return cached?JSON.parse(cached):null;
  }
}

async function jbSave(data){
  localStorage.setItem('sensi_cache',JSON.stringify(data));
  let bid=getBinId();
  if(!bid){
    // Crea nuovo bin
    const r=await fetch(JB,{method:'POST',headers:{'X-Master-Key':JSONBIN_KEY,'Content-Type':'application/json','X-Bin-Name':'sensi-2026','X-Bin-Private':'true'},body:JSON.stringify(data)});
    if(!r.ok)throw new Error('Errore creazione bin');
    const res=await r.json();
    bid=res.metadata.id;
    localStorage.setItem('sensi_bin_id',bid);
    return bid;
  }else{
    await fetch(`${JB}/${bid}`,{method:'PUT',headers:{'X-Master-Key':JSONBIN_KEY,'Content-Type':'application/json'},body:JSON.stringify(data)});
    return bid;
  }
}

// ── Dashboard ────────────────────────────────────────────────────
function Dashboard({mese,setMese,te,tf,tv,debiti}){
  const ent=te(mese),fis=tf(mese),vari=tv(mese),usc=fis+vari,saldo=ent-usc;
  const dr=debiti.reduce((s,d)=>s+d.residuo,0);
  const teAnno=MN.reduce((s,m)=>s+te(m),0);
  return h(Pg,null,
    h(PgHdr,{title:'Dashboard',right:h(MS,{mese,setMese})}),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:'10px'}},
      h(MC,{label:'Entrate mese',value:euro(ent),color:'var(--pos)'}),
      h(MC,{label:'Spese fisse',value:euro(fis),color:'var(--ac)'}),
      h(MC,{label:'Entrate anno',value:euro(teAnno),color:'var(--pos)'}),
      h(MC,{label:'Totale uscite',value:euro(usc),color:'var(--neg)'}),
      h(MC,{label:'Saldo',value:euro(saldo),color:saldo>=0?'var(--pos)':'var(--neg)'}),
      h(MC,{label:'Debiti residui',value:euro(dr),color:'var(--txt2)'})
    )
  );
}

// ── Entrate ──────────────────────────────────────────────────────
function Entrate({mese,setMese,entrate,setEntrate,precedente,setPrecedente}){
  const mob=useMobile();
  const [f,sf]=useState({data:tod(),importo:'',nota:''});
  const [totInput,sTotInput]=useState('');
  const cm=new Date().getMonth()+1;
  const passato=mese<cm;
  const rows=entrate.filter(e=>gm(e.data)===mese).sort((a,b)=>b.data.localeCompare(a.data));
  const dailyTot=rows.reduce((s,e)=>s+e.importo,0);
  const tot=dailyTot>0?dailyTot:(passato?(precedente['m'+mese]||0):0);
  const add=()=>{if(!f.importo)return;setEntrate([...entrate,{id:uid(),data:f.data,importo:parseFloat(f.importo),nota:f.nota}]);sf({data:tod(),importo:'',nota:''});};
  const saveTot=()=>{if(!totInput)return;setPrecedente({...precedente,['m'+mese]:parseFloat(totInput)});sTotInput('');};
  const C='130px 1fr 150px 28px';
  return h(Pg,null,
    h(PgHdr,{title:'Entrate',right:h(MS,{mese,setMese})}),
    passato?h('div',{style:{...card,padding:'24px'}},
      h('div',{style:{...HS,marginBottom:'16px'}},'Incasso totale mese'),
      tot>0?h('div',null,
        h('div',{style:{fontFamily:'var(--mono)',fontSize:'28px',fontWeight:'500',color:'var(--pos)',marginBottom:'16px'}},euro(tot)),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end'}},
          h(FL,{label:'Modifica importo'},h('input',{type:'number',placeholder:'0,00',value:totInput,onChange:e=>sTotInput(e.target.value),style:{...IS,width:'180px'}})),
          h(GB,{primary:true,onClick:saveTot,st:{alignSelf:'flex-end'}},'Aggiorna')
        )
      ):h('div',{style:{display:'flex',gap:'8px',alignItems:'flex-end'}},
        h(FL,{label:'Importo totale €'},h('input',{type:'number',placeholder:'0,00',value:totInput,onChange:e=>sTotInput(e.target.value),style:{...IS,width:'180px'}})),
        h(GB,{primary:true,onClick:saveTot,st:{alignSelf:'flex-end'}},'Salva')
      )
    ):h(Fragment,null,
    h('div',{style:{...card,padding:'18px',marginBottom:'14px'}},
      h('div',{style:{...HS,marginBottom:'12px'}},'Nuova entrata'),
      h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'flex-end'}},
        h(FL,{label:'Data'},h('input',{type:'date',value:f.data,onChange:e=>sf({...f,data:e.target.value}),style:{...IS,width:'150px'}})),
        h(FL,{label:'Importo €'},h('input',{type:'number',placeholder:'0,00',value:f.importo,onChange:e=>sf({...f,importo:e.target.value}),style:{...IS,width:'130px'}})),
        h(FL,{label:'Nota',st:{flex:1,minWidth:'160px'}},h('input',{placeholder:'Opzionale',value:f.nota,onChange:e=>sf({...f,nota:e.target.value}),style:{...IS}})),
        h(GB,{primary:true,onClick:add,st:{alignSelf:'flex-end',whiteSpace:'nowrap'}},'+ Aggiungi')
      )
    ),
    h('div',{style:{...card,overflowX:'auto'}},
      !mob&&h(TH,{cols:C,headers:['Data','Nota','Importo','']}),
      rows.length===0?h('div',{style:{padding:'32px',textAlign:'center',color:'var(--txt3)',fontSize:'13px'}},'Nessuna entrata per questo mese')
      :rows.map(e=>mob
        ?h(Row,{key:e.id,cols:'1fr auto 24px',del:()=>setEntrate(entrate.filter(x=>x.id!==e.id))},
          h('div',null,
            h('div',{style:{fontSize:'13px',color:'var(--txt)'}},e.nota||'Entrata'),
            h('div',{style:{fontSize:'11px',color:'var(--txt3)',marginTop:'2px'}},fmt(e.data))
          ),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:'15px',color:'var(--pos)',fontWeight:'500'}},euro(e.importo))
        )
        :h(Row,{key:e.id,cols:C,del:()=>setEntrate(entrate.filter(x=>x.id!==e.id))},
          h('div',{style:{fontSize:'13px',color:'var(--txt2)'}},fmt(e.data)),
          h('div',{style:{fontSize:'13px',color:'var(--txt2)'}},e.nota||'+'),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:'14px',color:'var(--pos)',fontWeight:'500'}},euro(e.importo))
        )),
      h(Foot,{label:'Totale mese',value:euro(tot),color:'var(--pos)'})
    )
  ));
}

// ── Spese Fisse ──────────────────────────────────────────────
function SpeseFisse({mese,setMese,fisse,setFisse,debiti,setDebiti}){
  const k=String(mese);
  const [nn,snn]=useState('');
  const [open,sOpen]=useState(null);
  const [af,saf]=useState({data:tod(),importo:'',nota:''});
  const mkVoci=()=>{
    if(fisse[k])return fisse[k];
    const prev=[...MN].slice().reverse().find(m=>m<mese&&fisse[String(m)]);
    if(prev)return fisse[String(prev)].map(v=>{
      const accP=(v.acconti||[]).reduce((s,a)=>s+a.importo,0);
      const resP=Math.max(0,(v.importo||0)+(v.riporto||0)-accP);
      return {...v,id:uid(),importo:0,acconti:[],pagato:false,riporto:v.pagato?0:resP,macro:v.macro||autoMacro(v.nome),debitoId:v.debitoId||''};
    });
    return FN.map(n=>({id:uid(),nome:n,importo:0,acconti:[],pagato:false,macro:autoMacro(n),debitoId:''}));
  };
  const upd=fn=>{const cur=mkVoci();setFisse({...fisse,[k]:fn(cur)});};
  const norm=v=>({acconti:[],riporto:0,...v});
  const voci=mkVoci().map(norm).sort((a,b)=>{const ma=MACRO.indexOf(a.macro||autoMacro(a.nome));const mb=MACRO.indexOf(b.macro||autoMacro(b.nome));return ma-mb;});
  const accTot=v=>(v.acconti||[]).reduce((s,a)=>s+a.importo,0);
  const dovuto=v=>(v.importo||0)+(v.riporto||0);
  const res=v=>Math.max(0,dovuto(v)-accTot(v));
  const totI=voci.reduce((s,v)=>s+(v.importo||0),0);
  const totRip=voci.reduce((s,v)=>s+(v.riporto||0),0);
  const totA=voci.reduce((s,v)=>s+accTot(v),0);
  const totR=voci.reduce((s,v)=>s+res(v),0);
  const addAcc=vId=>{
    if(!af.importo)return;
    const imp=parseFloat(af.importo);
    upd(c=>c.map(x=>x.id!==vId?x:{...x,acconti:[...(x.acconti||[]),{id:uid(),data:af.data,importo:imp,nota:af.nota}]}));
    saf({data:tod(),importo:'',nota:''});
  };
  const btnSt=(saldato,pagato)=>({
    border:`0.5px solid ${saldato||pagato?'var(--pos)':'var(--ac)'}`,
    background:saldato||pagato?'rgba(15,110,86,0.08)':'var(--ac-bg)',
    color:saldato||pagato?'var(--pos)':'var(--ac)',

    fontFamily:'var(--mono)',fontSize:'12px',
    cursor:'pointer',whiteSpace:'nowrap',
    minWidth:'90px',textAlign:'center'
  });
  return h(Pg,null,
    h(PgHdr,{title:'Spese',right:h(MS,{mese,setMese})}),
    h('div',{style:{...card}},
      voci.map(v=>{
        const ac=accTot(v),rv=res(v),io=open===v.id,saldato=rv===0&&dovuto(v)>0;
        return h(Fragment,{key:v.id},
          h('div',{style:{padding:'12px 16px',borderBottom:'0.5px solid var(--border)'}},
            // Riga 1: nome + pulsante elimina
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
              h('div',null,
                h('div',{style:{fontSize:'14px',fontWeight:'500',color:'var(--txt)'}},v.nome),
                v.riporto>0&&h('div',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--neg)',marginTop:'3px'}},`↩ ${euro(v.riporto)} non pagato dal mese scorso`)
              ),
              h('button',{onClick:()=>upd(c=>c.filter(x=>x.id!==v.id)),style:{background:'none',border:'none',color:'var(--txt3)',fontSize:'18px',padding:0,cursor:'pointer',lineHeight:1}},'×')
            ),
            // Riga 2: importo + stato allineato a destra
            h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}},
              h('input',{type:'number',value:v.importo||'',placeholder:'Importo €',onChange:e=>upd(c=>c.map(x=>x.id===v.id?{...x,importo:parseFloat(e.target.value)||0}:x)),style:{...IS,flex:1,padding:'7px 10px',fontSize:'14px'}}),
              h('button',{onClick:()=>{const np=!(v.pagato||saldato);upd(c=>c.map(x=>x.id===v.id?{...x,pagato:np}:x));if(np&&v.debitoId&&v.importo>0){setDebiti(debiti.map(d=>d.id!==v.debitoId?d:{...d,residuo:Math.max(0,d.residuo-v.importo),rate:[...(d.rate||[]),{id:uid(),data:tod(),importo:v.importo,nota:v.nome,src:'fisse'}]}));}},style:btnSt(saldato,v.pagato)},saldato||v.pagato?'✓ Pagato':'⏳ Aperto')
            ),
            // Riga 3: acconto + residuo
            (v.importo>0||v.riporto>0)&&h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
              h('div',{style:{flex:1,display:'flex',gap:'6px',alignItems:'center'}},

        h('input',{placeholder:'Aggiungi voce…',value:nn,onChange:e=>snn(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&nn.trim()){upd(c=>[...c,{id:uid(),nome:nn.trim(),importo:0,acconti:[],pagato:false,macro:autoMacro(nn.trim()),debitoId:''}]);snn('');}},style:{...IS}}),

      ),

// ── Assistente AI (analista integrato) ───────────────────────────
// Mappa le categorie delle spese variabili sulle macro-categorie
function mapVarMacro(cat){
  const c=(cat||'').toLowerCase();
  if(/materie|f&b|food/.test(c))return 'Food cost';
  if(/straordinar|lavoro/.test(c))return 'Costo personale';
  return 'Spese variabili';
}
// Ripartizione spese del mese per macro-categoria (fisse + variabili)
function macroBreakdown(mese,fisse,variabili){
  const k=String(mese),by={};
  MACRO.forEach(m=>by[m]=0);
  (fisse[k]||[]).forEach(v=>{const m=v.macro||autoMacro(v.nome);by[m]=(by[m]||0)+(v.importo||0);});
  variabili.filter(v=>gm(v.data)===mese).forEach(v=>{const m=mapVarMacro(v.cat);by[m]=(by[m]||0)+(v.importo||0);});
  return by;
}
// Genera punteggio di salute + lista di consigli dai dati reali
function analizza({mese,te,tf,tv,fisse,variabili,debiti,precedente}){
  const ins=[];
  const ent=te(mese);
  const by=macroBreakdown(mese,fisse,variabili);
  const usc=tf(mese)+tv(mese);
  const saldo=ent-usc;
  const dr=debiti.reduce((s,d)=>s+d.residuo,0);
  const rateMese=debiti.reduce((s,d)=>s+(d.rate||[]).filter(r=>gm(r.data)===mese).reduce((a,r)=>a+r.importo,0),0);
  const rateDir=debiti.reduce((s,d)=>s+(d.rate||[]).filter(r=>gm(r.data)===mese&&r.src!=='fisse').reduce((a,r)=>a+r.importo,0),0);
  const cassaNetta=saldo-rateDir;
  const food=by['Food cost'],pers=by['Costo personale'],aff=by['Affitto e utenze'];
  const prime=food+pers;
  const P=v=>ent>0?v/ent*100:0;
  let score=100;

  if(ent===0){
    ins.push({sev:'info',title:'Mancano le entrate',text:'Inserisci l\'incasso del mese (tab Entrate) per ricevere l\'analisi completa con percentuali, KPI e consigli su misura.'});
    score=null;
  }else{
    // ── Saldo del mese ──
    if(saldo<0){ins.push({sev:'crit',title:'Mese in perdita',text:`Le uscite (${euro(usc)}) superano gli incassi (${euro(ent)}): perdita di ${euro(-saldo)}. Servono più incassi o un taglio deciso dei costi variabili.`});score-=30;}
    else if(P(saldo)<5){ins.push({sev:'warn',title:'Margine molto basso',text:`Utile di ${euro(saldo)}, solo il ${P(saldo).toFixed(1)}% degli incassi. Sotto il 5% il margine è fragile: un imprevisto manda il mese in rosso.`});score-=15;}
    else if(P(saldo)>=10){ins.push({sev:'good',title:'Buona redditività',text:`Utile di ${euro(saldo)}, pari al ${P(saldo).toFixed(1)}% degli incassi. Sopra il 10% è un ottimo risultato per la ristorazione.`});}
    else{ins.push({sev:'good',title:'Conti in equilibrio',text:`Utile di ${euro(saldo)} (${P(saldo).toFixed(1)}% degli incassi). Margine nella norma, c\'è spazio per migliorare.`});}

    // ── Cassa dopo le rate dei debiti ──
    if(rateDir>0&&cassaNetta<0){ins.push({sev:'warn',title:'Cassa negativa dopo le rate',text:`Margine operativo ${euro(saldo)}, ma dopo aver versato ${euro(rateDir)} di rate debiti la cassa del mese scende a ${euro(cassaNetta)}: stai attingendo alle riserve per pagare i finanziamenti.`});score-=10;}

    // ── Food cost ──
    if(food>0){const p=P(food);
      if(p>36){ins.push({sev:'crit',title:`Food cost alto · ${p.toFixed(1)}%`,text:`Materie prime ${euro(food)}, oltre la soglia del 35%. Rivedi fornitori, porzioni e sprechi. Obiettivo: 30-33%.`});score-=12;}
      else if(p<22){ins.push({sev:'warn',title:`Food cost basso · ${p.toFixed(1)}%`,text:`Insolitamente basso. Ottimo per il margine, ma verifica di aver registrato tutte le spese di materie prime.`});}
      else{ins.push({sev:'good',title:`Food cost in linea · ${p.toFixed(1)}%`,text:`Materie prime ${euro(food)}, nella fascia ideale (22-36%).`});}}

    // ── Costo personale ──
    if(pers>0){const p=P(pers);
      if(p>38){ins.push({sev:'crit',title:`Costo personale alto · ${p.toFixed(1)}%`,text:`Costo del lavoro ${euro(pers)}, oltre il 38% degli incassi. Rivedi i turni nelle fasce a bassa affluenza e tieni d\'occhio gli straordinari.`});score-=12;}
      else if(p>32){ins.push({sev:'warn',title:`Costo personale da monitorare · ${p.toFixed(1)}%`,text:`Costo del lavoro ${euro(pers)}, verso il limite alto. Controlla gli straordinari.`});score-=5;}
      else{ins.push({sev:'good',title:`Costo personale in linea · ${p.toFixed(1)}%`,text:`Costo del lavoro ${euro(pers)}, nella norma.`});}}

    // ── Prime cost (indicatore chiave) ──
    if(prime>0){const p=P(prime);
      if(p>65){ins.push({sev:'crit',title:`Prime cost critico · ${p.toFixed(1)}%`,text:`Food + personale = ${euro(prime)}, oltre il 65% degli incassi. È l\'indicatore più importante: oltre questa soglia è quasi impossibile fare utile. Agisci su materie prime e turni.`});score-=20;}
      else if(p<=60){ins.push({sev:'good',title:`Prime cost sano · ${p.toFixed(1)}%`,text:`Food + personale al ${p.toFixed(1)}%, sotto la soglia del 65%: base solida per la redditività.`});}
      else{ins.push({sev:'warn',title:`Prime cost da tenere d\'occhio · ${p.toFixed(1)}%`,text:`Food + personale al ${p.toFixed(1)}%, vicino al limite del 65%.`});score-=8;}}

    // ── Affitto e utenze ──
    if(aff>0){const p=P(aff);
      if(p>15){ins.push({sev:'warn',title:`Affitto e utenze pesanti · ${p.toFixed(1)}%`,text:`Affitto + utenze = ${euro(aff)}, oltre il 15% degli incassi. Costo difficile da ridurre: significa che servono più incassi per coprire il fisso.`});score-=6;}
      else{ins.push({sev:'good',title:`Affitto e utenze sostenibili · ${p.toFixed(1)}%`,text:`${euro(aff)}, entro la soglia del 15% degli incassi.`});}}
  }

  // ── Confronto anno precedente ──
  const prec=precedente[String(mese)]||0;
  if(prec>0&&ent>0){const d=ent-prec,dp=d/prec*100;
    if(d>=0)ins.push({sev:'good',title:`In crescita sul ${ANNO-1} · +${dp.toFixed(0)}%`,text:`Questo mese ${euro(ent)} contro ${euro(prec)} dell\'anno scorso: +${euro(d)}.`});
    else{ins.push({sev:'warn',title:`In calo sul ${ANNO-1} · ${dp.toFixed(0)}%`,text:`Questo mese ${euro(ent)} contro ${euro(prec)} dell\'anno scorso: ${euro(d)}. Capire la causa aiuta a recuperare.`});if(score!==null)score-=5;}
  }

  // ── Spese non ancora saldate ──
  const k=String(mese);
  const daPagare=(fisse[k]||[]).reduce((s,v)=>{const acc=(v.acconti||[]).reduce((a,x)=>a+x.importo,0);return s+Math.max(0,(v.importo||0)+(v.riporto||0)-acc);},0);
  if(daPagare>0){ins.push({sev:'warn',title:'Spese ancora da saldare',text:`Restano ${euro(daPagare)} di spese fisse non ancora pagate questo mese. Pianifica i pagamenti per evitare accumuli.`});if(score!==null)score-=4;}

  // ── Debiti ──
  if(dr>0){
    if(saldo>0){const mesi=Math.ceil(dr/saldo);ins.push({sev:'info',title:`Debiti residui · ${euro(dr)}`,text:`${rateMese>0?`Questo mese hai versato ${euro(rateMese)} di rate. `:''}Con l\'utile attuale di ${euro(saldo)}/mese servirebbero circa ${mesi} mes${mesi===1?'e':'i'} per estinguere il resto.`});}
    else{ins.push({sev:'crit',title:`Debiti residui · ${euro(dr)}`,text:`In pareggio/perdita non generi utile per ridurre i debiti. Priorità assoluta: tornare in utile.`});if(score!==null)score-=10;}
  }else if(debiti.length>0){ins.push({sev:'good',title:'Debiti estinti',text:'Tutti i debiti registrati risultano saldati. Ottimo lavoro.'});}

  // Ordina: prima i problemi più gravi
  const ord={crit:0,warn:1,info:2,good:3};
  ins.sort((a,b)=>ord[a.sev]-ord[b.sev]);
  if(score!==null)score=Math.max(0,Math.min(100,Math.round(score)));
  return {ins,ent,usc,saldo,by,food,pers,prime,aff,P,score,dr,rateMese,rateDir,cassaNetta};
}

const SEV={
  crit:{c:'var(--neg)',bg:'rgba(163,45,45,0.10)',i:'!'},
  warn:{c:'var(--ac)',bg:'var(--ac-bg)',i:'!'},
  good:{c:'var(--pos)',bg:'rgba(15,110,86,0.10)',i:'✓'},
  info:{c:'var(--txt2)',bg:'var(--surf2)',i:'i'}
};
function InsightCard({sev,title,text}){
  const s=SEV[sev]||SEV.info;
  return h('div',{style:{...card,padding:'13px 15px',borderLeft:`3px solid ${s.c}`,display:'flex',gap:'12px',alignItems:'flex-start'}},
    h('div',{style:{width:'22px',height:'22px',borderRadius:'50%',background:s.bg,color:s.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:'600',flexShrink:0,marginTop:'1px'}},s.i),
    h('div',{style:{flex:1}},
      h('div',{style:{fontFamily:'var(--mono)',fontSize:'13px',fontWeight:'500',color:s.c,marginBottom:'3px'}},title),
      h('div',{style:{fontFamily:'var(--mono)',fontSize:'12px',color:'var(--txt2)',lineHeight:'1.6'}},text)
    )
  );
}
function Kpi({label,val,pct,ideal,ent}){
  let col='var(--txt3)';
  if(ent>0&&val>0&&ideal){col=pct>ideal.max?'var(--neg)':pct<ideal.min?'var(--ac)':'var(--pos)';}
  return h('div',{style:{background:'var(--surf2)',borderRadius:'var(--rad)',padding:'12px 14px'}},
    h('div',{style:{...HS,marginBottom:'6px'}},label),
    h('div',{style:{fontFamily:'var(--mono)',fontSize:'18px',fontWeight:'500',color:col}},ent>0&&val>0?pct.toFixed(1)+'%':'—'),
    h('div',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt3)',marginTop:'2px'}},val>0?euro(val):(ideal?`ideale ${ideal.min}-${ideal.max}%`:''))
  );
}
function Assistente(props){
  const {mese,setMese}=props;
  const a=analizza(props);
  const scoreCol=a.score===null?'var(--txt3)':a.score>=75?'var(--pos)':a.score>=50?'var(--ac)':'var(--neg)';
  const scoreLbl=a.score===null?'—':a.score>=75?'Conti in salute':a.score>=50?'Da tenere d\'occhio':'Situazione critica';
  return h(Pg,null,
    h(PgHdr,{title:'Assistente',right:h(MS,{mese,setMese})}),
    // Punteggio di salute
    h('div',{style:{...card,padding:'20px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'20px',flexWrap:'wrap'}},
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:'110px'}},
        h('div',{style:{fontFamily:'var(--mono)',fontSize:'42px',fontWeight:'500',color:scoreCol,lineHeight:1}},a.score===null?'—':a.score),
        h('div',{style:{...HS,fontSize:'10px'}},'salute / 100')
      ),
      h('div',{style:{flex:1,minWidth:'180px'}},
        h('div',{style:{fontFamily:'var(--pf)',fontSize:'18px',fontWeight:'500',color:scoreCol,marginBottom:'4px'}},scoreLbl),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:'12px',color:'var(--txt2)',lineHeight:'1.6'}},
          a.ent>0?`Incasso ${euro(a.ent)} · Uscite ${euro(a.usc)} · Saldo ${euro(a.saldo)}`:'Inserisci le entrate del mese per calcolare il punteggio.')
      )
    ),
    // KPI ristorazione
    a.ent>0&&h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'10px',marginBottom:'14px'}},
      h(Kpi,{label:'Food cost',val:a.food,pct:a.P(a.food),ideal:{min:22,max:36},ent:a.ent}),
      h(Kpi,{label:'Costo personale',val:a.pers,pct:a.P(a.pers),ideal:{min:18,max:38},ent:a.ent}),
      h(Kpi,{label:'Prime cost',val:a.prime,pct:a.P(a.prime),ideal:{min:0,max:65},ent:a.ent}),
      h(Kpi,{label:'Affitto+utenze',val:a.aff,pct:a.P(a.aff),ideal:{min:0,max:15},ent:a.ent}),
      h(Kpi,{label:'Margine',val:a.saldo>0?a.saldo:0,pct:a.P(a.saldo),ideal:{min:5,max:100},ent:a.ent})
    ),
    // Riepilogo debiti
    props.debiti.length>0&&h('div',{style:{...card,padding:'16px',marginBottom:'14px'}},
      h('div',{style:{...HS,marginBottom:'12px'}},'Debiti'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'10px'}},
        h(MC,{label:'Versato questo mese',value:a.rateMese>0?euro(a.rateMese):'—',color:'var(--pos)'}),
        h(MC,{label:'Debiti residui',value:euro(a.dr),color:a.dr>0?'var(--neg)':'var(--pos)'}),
        h(MC,{label:'Cassa dopo le rate',value:a.ent>0?euro(a.cassaNetta):'—',color:a.cassaNetta>=0?'var(--pos)':'var(--neg)'})
      )
    ),
    // Consigli
    h('div',{style:{...HS,margin:'4px 2px 10px'}},`Analisi e consigli · ${a.ins.length}`),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
      a.ins.map((x,i)=>h(InsightCard,{key:i,...x}))
    ),
    h('div',{style:{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--txt3)',textAlign:'center',marginTop:'16px',lineHeight:'1.6'}},
      'Analisi automatica basata sui dati inseriti e su benchmark della ristorazione. Indicazioni di supporto, non sostituiscono il commercialista.')
  );
}

function App(){
  const [load,sLoad]=useState(true);
  const [err,sErr]=useState('');
  const [newBinId,sNewBid]=useState('');
  const [syncing,sSyncing]=useState(false);
  const [lastSync,sLastSync]=useState(null);

  const [data,sData]=useState(EMPTY);
  const cm=new Date().getMonth()+1;
  const [mese,sMese]=useState(cm>=1&&cm<=12?cm:1);
  const [tab,sTab]=useState('dashboard');

  // Carica dati all'avvio
  useEffect(()=>{
    (async()=>{
      if(JSONBIN_KEY==='INSERISCI_LA_TUA_MASTER_KEY'){
        sErr('setup');sLoad(false);return;
      }
      const d=await jbLoad();
      if(d)sData({...EMPTY,...d});
      sLoad(false);
      sLastSync(new Date());
    })();
  },[]);

  // Ricarica quando la tab torna in focus
  useEffect(()=>{
    const onVisible=()=>{
      if(!document.hidden&&JSONBIN_KEY!=='INSERISCI_LA_TUA_MASTER_KEY'){
        jbLoad().then(d=>{if(d)sData({...EMPTY,...d});sLastSync(new Date());});
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[]);

  // Salva dati aggiornando tutto il record
  const save=useCallback(async(newData)=>{
    sSyncing(true);
    try{
      const bid=await jbSave(newData);
      if(bid&&!JSONBIN_BIN_ID&&!localStorage.getItem('sensi_bin_id_confirmed')){
        sNewBid(bid);
      }
    }catch(e){console.error(e);}
    sSyncing(false);
    sLastSync(new Date());
  },[]);

  // Setter che aggiornano lo state e salvano
  const setEntrate=v=>{const nd={...data,entrate:v};sData(nd);save(nd);};
  const setFisse=v=>{const nd={...data,fisse:v};sData(nd);save(nd);};
  const setVariabili=v=>{const nd={...data,variabili:v};sData(nd);save(nd);};
  const setDebiti=v=>{const nd={...data,debiti:v};sData(nd);save(nd);};
  const setPrecedente=v=>{const nd={...data,precedente:v};sData(nd);save(nd);};

  const cm2=new Date().getMonth()+1;
  const te=m=>{const d=data.entrate.filter(e=>gm(e.data)===m).reduce((s,e)=>s+e.importo,0);return d>0?d:(m<cm2?(data.precedente['m'+m]||0):0);};
  const tf=m=>(data.fisse[String(m)]||[]).reduce((s,v)=>s+(v.importo||0),0);
  const tv=m=>data.variabili.filter(v=>gm(v.data)===m).reduce((s,v)=>s+v.importo,0);

  const TABS=[{id:'dashboard',l:'Dashboard'},{id:'entrate',l:'Entrate'},{id:'fisse',l:'Spese'},{id:'debiti',l:'Debiti'},{id:'panoramica',l:'Panoramica'},{id:'analisi',l:'Analisi'},{id:'assistente',l:'✦ Assistente'}];
  const sh={mese,setMese:sMese,entrate:data.entrate,setEntrate,fisse:data.fisse,setFisse,variabili:data.variabili,setVariabili,debiti:data.debiti,setDebiti,precedente:data.precedente,setPrecedente,te,tf,tv};

  // Schermata di setup
  if(err==='setup'){
    return h('div',{style:{maxWidth:'560px',margin:'80px auto',padding:'0 20px'}},
      h('div',{style:{...card,padding:'32px'}},
        h('div',{style:{fontFamily:'var(--pf)',fontSize:'24px',fontWeight:'500',color:'var(--ac)',marginBottom:'8px'}},'Sensi'),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt3)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'24px'}},'configurazione iniziale'),
        h('p',{style:{fontSize:'13px',color:'var(--txt2)',lineHeight:'1.7',marginBottom:'20px'}},'Per attivare il salvataggio condiviso con Livia, serve una chiave API gratuita di JSONBin.'),
        h('ol',{style:{fontSize:'13px',color:'var(--txt2)',lineHeight:'2',paddingLeft:'18px',marginBottom:'20px'}},
          h('li',null,'Crea un account gratuito su ',h('a',{href:'https://jsonbin.io',target:'_blank',style:{color:'var(--ac)'}},'jsonbin.io')),
          h('li',null,'Vai su ',h('b',null,'API Keys'),' → copia la ',h('b',null,'Master Key')),
          h('li',null,'Apri il file HTML e incolla la chiave in ',h('code',{style:{background:'var(--surf2)',padding:'1px 5px',borderRadius:'4px',fontSize:'12px'}},"JSONBIN_KEY = '...'")),
          h('li',null,'Salva e riapri il file')
        )
      )
    );
  }

  if(load){
    return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'var(--mono)',fontSize:'13px',color:'var(--txt3)'}},'Caricamento…');
  }

  return h('div',null,
    // Header
    h('div',{style:{background:'var(--surf)',borderBottom:'0.5px solid var(--border)',position:'sticky',top:0,zIndex:100}},
      h('div',{className:'hdrwrap',style:{maxWidth:'940px',margin:'0 auto',padding:'0 20px'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0 10px'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:'10px'}},
            h('span',{style:{fontFamily:'var(--pf)',fontSize:'20px',fontWeight:'500',color:'var(--ac)'}},'Sensi'),
            h('span',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt3)',letterSpacing:'0.08em'}},`gestione economica ${ANNO}`)
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
            syncing&&h('span',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt3)'}},'Salvataggio…'),
            !syncing&&lastSync&&h('span',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt3)'}},`Sync ${lastSync.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`),
            h('button',{onClick:()=>jbLoad().then(d=>{if(d)sData({...EMPTY,...d});sLastSync(new Date());}),style:{background:'none',border:'0.5px solid var(--border)',borderRadius:'var(--rad)',padding:'4px 10px',fontFamily:'var(--mono)',fontSize:'11px',color:'var(--txt2)',cursor:'pointer'}},'🔄 Aggiorna')
          )
        ),
        h('div',{style:{display:'flex',gap:'2px',overflowX:'auto',marginBottom:'-0.5px'}},
          TABS.map(t=>h('button',{key:t.id,className:`nb${tab===t.id?' on':''}`,onClick:()=>sTab(t.id)},t.l))
        )
      )
    ),

    // Banner bin ID (prima volta)
    newBinId&&h('div',{style:{background:'rgba(186,117,23,0.1)',borderBottom:'1px solid var(--ac)',padding:'10px 20px',fontFamily:'var(--mono)',fontSize:'12px',color:'var(--ac)',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}},
      h('span',null,'✓ Bin creato con successo! ID: ',h('strong',null,newBinId)),
      h('span',{style:{color:'var(--txt2)'}},'— Inserisci questo ID nel file HTML (riga JSONBIN_BIN_ID) e rideploya per usare la stessa cartella con Livia.'),
      h('button',{onClick:()=>{localStorage.setItem('sensi_bin_id_confirmed','1');sNewBid('');},style:{background:'none',border:'none',cursor:'pointer',color:'var(--txt3)',fontSize:'16px'}},'×')
    ),

    // Contenuto
    tab==='dashboard'&&h(Dashboard,sh),
    tab==='entrate'&&h(Entrate,sh),
    tab==='fisse'&&h(SpeseFisse,{...sh,debiti:data.debiti,setDebiti}),
    
    tab==='debiti'&&h(Debiti,sh),
    tab==='panoramica'&&h(Panoramica,sh),
      tab==='analisi'&&h(Analisi,sh),
      tab==='assistente'&&h(Assistente,sh)
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
